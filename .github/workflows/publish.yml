name: Publish

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Pre-publish gate ─────────────────────────────────────────────────────────
  verify:
    name: Pre-publish verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Run full test suite
        run: cargo test --workspace --all-features

      - name: Run no_std check (no_std-compatible crates only)
        run: cargo test -p animato-core -p animato-tween -p animato-spring --no-default-features

      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── Publish in dependency order ───────────────────────────────────────────────
  # Each crate must be visible on crates.io before the next can be published.
  # The 30s sleep gives the registry index time to propagate.
  #
  # v0.3.0 scope: animato-core → animato-tween → animato-spring → animato-driver → animato-timeline → animato
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish animato-core
        run: cargo publish -p animato-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-tween
        run: cargo publish -p animato-tween --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-spring
        run: cargo publish -p animato-spring --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-driver
        run: cargo publish -p animato-driver --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-timeline
        run: cargo publish -p animato-timeline --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato (facade)
        run: cargo publish -p animato --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write   # required to create releases

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Animato ${{ steps.version.outputs.VERSION }} — Control"
          body: |
            ## Animato ${{ steps.version.outputs.VERSION }} — Control

            The third release of the Animato animation library for Rust, adding runtime control, callbacks, async completion waiting, and CSS-compatible easing.

            ### Crates published to crates.io

            | Crate | Version | Description |
            |-------|---------|-------------|
            | [`animato-core`](https://crates.io/crates/animato-core) | `${{ steps.version.outputs.VERSION }}` | Traits + 33 easing variants, `no_std` |
            | [`animato-tween`](https://crates.io/crates/animato-tween) | `${{ steps.version.outputs.VERSION }}` | `Tween<T>`, `Loop`, builder pattern, `no_std`, `KeyframeTrack`, serde |
            | [`animato-spring`](https://crates.io/crates/animato-spring) | `${{ steps.version.outputs.VERSION }}` | `Spring`, `SpringN<T>`, 5 presets, `no_std` |
            | [`animato-driver`](https://crates.io/crates/animato-driver) | `${{ steps.version.outputs.VERSION }}` | `AnimationDriver`, `Clock` variants |
            | [`animato-timeline`](https://crates.io/crates/animato-timeline) | `${{ steps.version.outputs.VERSION }}` | `Timeline`, `Sequence`, `stagger`, time scale, callbacks, async wait |
            | [`animato`](https://crates.io/crates/animato) | `${{ steps.version.outputs.VERSION }}` | Facade — re-exports all of the above |

            ### Quick Start

            ```toml
            [dependencies]
            animato = { version = "${{ steps.version.outputs.VERSION }}", features = ["timeline", "tokio"] }
            ```

            ```rust
            use animato::{At, Timeline, Tween, Easing, Update};

            let tween = Tween::new(0.0_f32, 100.0)
                .duration(1.0)
                .easing(Easing::EaseOutCubic)
                .build();

            let mut timeline = Timeline::new()
                .add("move", tween, At::Start)
                .time_scale(1.0)
                .on_complete(|| println!("timeline complete"));

            timeline.play();
            timeline.update(0.016);
            ```

            ### What's New in v0.3.0
            - ✅ Timeline time scale via `.time_scale()` and `.set_time_scale()`
            - ✅ Timeline callbacks via `.on_entry_complete()` and `.on_complete()`
            - ✅ Tokio completion waiting via `.wait().await`
            - ✅ CSS-compatible `CubicBezier(...)` and `Steps(...)` easing variants
            - ✅ Serde trait re-exports and expanded serde coverage
            - ✅ 200+ tests passing across all crates

            ### What's Included
            - ✅ `no_std` support for `animato-core`, `animato-tween`, `animato-spring`
            - ✅ Criterion benchmarks for easing, tween, spring, and timeline
            - ✅ CI: stable + beta + nightly toolchains

            See [CHANGELOG.md](./CHANGELOG.md) and [ROADMAP.md](./ROADMAP.md) for details.
          draft: false
          prerelease: false
