name: Publish

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Pre-publish gate ─────────────────────────────────────────────────────────
  verify:
    name: Pre-publish verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Run full test suite
        run: cargo test --workspace --all-features

      - name: Run no_std check (no_std-compatible crates only)
        run: cargo test -p animato-core -p animato-tween -p animato-spring --no-default-features

      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── Publish in dependency order ───────────────────────────────────────────────
  # Each crate must be visible on crates.io before the next can be published.
  # The 30s sleep gives the registry index time to propagate.
  #
  # v0.1.0 scope: animato-core → animato-tween → animato-spring → animato-driver → animato
  # (animato-path, animato-physics, animato-color, animato-timeline, animato-gpu,
  #  animato-bevy, animato-wasm are deferred to later versions — see ROADMAP.md)
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish animato-core
        run: cargo publish -p animato-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-tween
        run: cargo publish -p animato-tween --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-spring
        run: cargo publish -p animato-spring --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-driver
        run: cargo publish -p animato-driver --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato (facade)
        run: cargo publish -p animato --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write   # required to create releases

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Animato ${{ steps.version.outputs.VERSION }} — Foundation"
          body: |
            ## Animato ${{ steps.version.outputs.VERSION }} — Foundation

            The first stable release of the Animato animation library for Rust.

            ### Crates published to crates.io

            | Crate | Version | Description |
            |-------|---------|-------------|
            | [`animato-core`](https://crates.io/crates/animato-core) | `${{ steps.version.outputs.VERSION }}` | Traits + 31 easing functions, `no_std` |
            | [`animato-tween`](https://crates.io/crates/animato-tween) | `${{ steps.version.outputs.VERSION }}` | `Tween<T>`, `Loop`, builder pattern, `no_std` |
            | [`animato-spring`](https://crates.io/crates/animato-spring) | `${{ steps.version.outputs.VERSION }}` | `Spring`, `SpringN<T>`, 5 presets, `no_std` |
            | [`animato-driver`](https://crates.io/crates/animato-driver) | `${{ steps.version.outputs.VERSION }}` | `AnimationDriver`, `Clock` variants |
            | [`animato`](https://crates.io/crates/animato) | `${{ steps.version.outputs.VERSION }}` | Facade — re-exports all of the above |

            ### Quick Start

            ```toml
            [dependencies]
            animato = "${{ steps.version.outputs.VERSION }}"
            ```

            ```rust
            use animato::{Tween, Easing, Update};

            let mut tween = Tween::new(0.0_f32, 100.0)
                .duration(1.0)
                .easing(Easing::EaseOutCubic)
                .build();

            tween.update(0.016);
            println!("{}", tween.value());
            ```

            ### What's Included
            - ✅ 144 tests passing across all crates
            - ✅ `no_std` support for `animato-core`, `animato-tween`, `animato-spring`
            - ✅ Criterion benchmarks for easing, tween, and spring
            - ✅ CI: stable + beta + nightly toolchains

            See [CHANGELOG.md](./CHANGELOG.md) and [ROADMAP.md](./ROADMAP.md) for details.
          draft: false
          prerelease: false
