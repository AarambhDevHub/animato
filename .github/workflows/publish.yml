name: Publish

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  verify:
    name: Pre-publish verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
          targets: wasm32-unknown-unknown, thumbv7m-none-eabi

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-
            ${{ runner.os }}-cargo-

      - name: Install release tools
        run: |
          rustup toolchain install nightly
          cargo install cargo-llvm-cov --locked
          cargo install cargo-fuzz --locked
          cargo install wasm-pack --locked

      - name: Validate tag matches workspace version
        run: |
          set -euo pipefail
          workspace_version="$(sed -n 's/^version[[:space:]]*=[[:space:]]*"\([^"]*\)"/\1/p' Cargo.toml | head -n1)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$workspace_version" != "$tag_version" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match workspace version ${workspace_version}" >&2
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Run full test suite
        run: cargo test --workspace --all-features

      - name: Run full no-default-features gate
        run: cargo test --workspace --no-default-features

      - name: Compile registered examples
        run: cargo test -p animato --all-features --examples

      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Check WASM integrations
        run: cargo check -p animato-wasm --target wasm32-unknown-unknown --features wasm-dom

      - name: Run WASM browser tests
        run: |
          cd examples/wasm_counter
          wasm-pack test --headless --chrome

      - name: Build no_std crates for bare metal
        run: |
          cargo build -p animato-core --target thumbv7m-none-eabi --no-default-features
          cargo build -p animato-tween --target thumbv7m-none-eabi --no-default-features
          cargo build -p animato-spring --target thumbv7m-none-eabi --no-default-features
          cargo build -p animato-path --target thumbv7m-none-eabi --no-default-features
          cargo build -p animato-physics --target thumbv7m-none-eabi --no-default-features
          cargo build -p animato-color --target thumbv7m-none-eabi --no-default-features

      - name: Compile benchmark suite
        run: cargo bench --workspace --no-run

      - name: Coverage gate
        run: cargo llvm-cov --workspace --all-features --fail-under-lines 90

      - name: Fuzz SVG path parser
        run: cargo +nightly fuzz run svg_path_parser -- -max_total_time=60

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-
            ${{ runner.os }}-cargo-

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          publish_crate() {
            crate="$1"
            log="publish-${crate}.log"

            cargo publish -p "$crate" --dry-run

            set +e
            cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN" 2>&1 | tee "$log"
            status="${PIPESTATUS[0]}"
            set -e

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if grep -Eiq "already uploaded|already exists|crate version .* is already uploaded" "$log"; then
              echo "$crate is already published for this version; continuing explicit rerun."
              return 0
            fi

            echo "Publishing $crate failed." >&2
            exit "$status"
          }

          for crate in \
            animato-core \
            animato-color \
            animato-tween \
            animato-spring \
            animato-path \
            animato-physics \
            animato-driver \
            animato-timeline \
            animato-gpu \
            animato-wasm \
            animato-bevy \
            animato
          do
            publish_crate "$crate"
            if [ "$crate" != "animato" ]; then
              sleep 30
            fi
          done

  pages:
    name: Deploy WASM example to Pages
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      pages: write
      id-token: write
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM counter example
        run: |
          cd examples/wasm_counter
          wasm-pack build --target web

      - name: Prepare Pages artifact
        run: |
          mkdir -p site/www site/pkg
          cp examples/wasm_counter/www/index.html site/www/index.html
          cp -R examples/wasm_counter/pkg/. site/pkg/

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish, pages]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "Animato ${{ steps.version.outputs.TAG }} — Stable"
          body: |
            ## Animato ${{ steps.version.outputs.TAG }} — Stable

            Animato v1.0.0 stabilizes the existing v0.9 API without public
            renames or removals. This release freezes the public API, expands
            documentation, hardens release verification, and publishes every
            workspace crate at the same stable version.

            ### Install

            ```toml
            [dependencies]
            animato = "${{ steps.version.outputs.VERSION }}"
            ```

            ### Crates published to crates.io

            | Crate | Version | Description |
            |-------|---------|-------------|
            | [`animato-core`](https://crates.io/crates/animato-core) | `${{ steps.version.outputs.VERSION }}` | Traits, interpolation, and easing |
            | [`animato-color`](https://crates.io/crates/animato-color) | `${{ steps.version.outputs.VERSION }}` | Perceptual color wrappers |
            | [`animato-tween`](https://crates.io/crates/animato-tween) | `${{ steps.version.outputs.VERSION }}` | `Tween<T>` and keyframe tracks |
            | [`animato-spring`](https://crates.io/crates/animato-spring) | `${{ steps.version.outputs.VERSION }}` | Scalar and component springs |
            | [`animato-path`](https://crates.io/crates/animato-path) | `${{ steps.version.outputs.VERSION }}` | Bezier, SVG paths, motion paths, morphing |
            | [`animato-physics`](https://crates.io/crates/animato-physics) | `${{ steps.version.outputs.VERSION }}` | Inertia, drag, and gesture recognition |
            | [`animato-driver`](https://crates.io/crates/animato-driver) | `${{ steps.version.outputs.VERSION }}` | Drivers, clocks, and scroll drivers |
            | [`animato-timeline`](https://crates.io/crates/animato-timeline) | `${{ steps.version.outputs.VERSION }}` | Timeline, sequence, and stagger composition |
            | [`animato-gpu`](https://crates.io/crates/animato-gpu) | `${{ steps.version.outputs.VERSION }}` | GPU/CPU fallback batch tween evaluation |
            | [`animato-wasm`](https://crates.io/crates/animato-wasm) | `${{ steps.version.outputs.VERSION }}` | rAF and DOM helpers |
            | [`animato-bevy`](https://crates.io/crates/animato-bevy) | `${{ steps.version.outputs.VERSION }}` | Bevy integration plugin |
            | [`animato`](https://crates.io/crates/animato) | `${{ steps.version.outputs.VERSION }}` | Stable facade crate |

            ### Verification

            - `cargo fmt --check`
            - `cargo clippy --workspace --all-features -- -D warnings`
            - `cargo test --workspace --all-features`
            - `cargo test --workspace --no-default-features`
            - `cargo test -p animato --all-features --examples`
            - `cargo doc --workspace --all-features --no-deps`
            - `cargo check -p animato-wasm --target wasm32-unknown-unknown --features wasm-dom`
            - `wasm-pack test --headless --chrome`
            - `cargo bench --workspace --no-run`
            - `cargo llvm-cov --workspace --all-features --fail-under-lines 90`
            - `cargo +nightly fuzz run svg_path_parser -- -max_total_time=60`
            - `cargo publish --dry-run` for every crate immediately before publish

            ### Documentation

            - [README](./README.md)
            - [Full API map](./docs/api-full.md)
            - [Getting started](./docs/getting-started.md)
            - [Feature flags](./docs/feature-flags.md)
            - [Testing](./docs/testing.md)
            - [Release process](./docs/release.md)
            - [Changelog](./CHANGELOG.md)

            ### WASM Example

            The prebuilt WASM counter example is deployed through GitHub Pages:
            ${{ needs.pages.outputs.page_url }}

            ### Notes

            Capture benchmark timing on release hardware before public
            announcement and include it in follow-up release commentary when
            publishing to community channels.
          draft: false
          prerelease: false
