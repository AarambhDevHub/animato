name: Publish

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Pre-publish gate ─────────────────────────────────────────────────────────
  verify:
    name: Pre-publish verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Run full test suite
        run: cargo test --workspace --all-features

      - name: Run no_std check (no_std-compatible crates only)
        run: cargo test -p animato-core -p animato-tween -p animato-spring -p animato-path -p animato-physics -p animato-color --no-default-features

      - name: Run full no-default-features gate
        run: cargo test --workspace --no-default-features

      - name: Check GPU crate
        run: cargo check -p animato-gpu

      - name: Check WASM integrations
        run: cargo check -p animato-wasm --target wasm32-unknown-unknown --features wasm-dom

      - name: Build no_std alloc crates for bare metal
        run: |
          rustup target add thumbv7m-none-eabi
          cargo build -p animato-spring --target thumbv7m-none-eabi --no-default-features --features alloc
          cargo build -p animato-physics --target thumbv7m-none-eabi --no-default-features --features alloc
          cargo build -p animato-path --target thumbv7m-none-eabi --no-default-features --features alloc

      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── Publish in dependency order ───────────────────────────────────────────────
  # Each crate must be visible on crates.io before the next can be published.
  # The 30s sleep gives the registry index time to propagate.
  #
  # v0.9.0 scope: animato-core → animato-color → animato-tween → animato-spring
  #               → animato-path → animato-physics → animato-driver
  #               → animato-timeline → animato-gpu → animato-wasm
  #               → animato-bevy → animato
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish animato-core
        run: cargo publish -p animato-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-color
        run: cargo publish -p animato-color --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-tween
        run: cargo publish -p animato-tween --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-spring
        run: cargo publish -p animato-spring --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-path
        run: cargo publish -p animato-path --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-physics
        run: cargo publish -p animato-physics --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-driver
        run: cargo publish -p animato-driver --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-timeline
        run: cargo publish -p animato-timeline --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-gpu
        run: cargo publish -p animato-gpu --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-wasm
        run: cargo publish -p animato-wasm --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-bevy
        run: cargo publish -p animato-bevy --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato (facade)
        run: cargo publish -p animato --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "Animato ${{ steps.version.outputs.TAG }} — Performance"
          body: |
            ## Animato ${{ steps.version.outputs.TAG }} — Performance

            The ninth release of Animato adds `animato-gpu`, benchmark coverage,
            stronger no_std/alloc release gates, and targeted v0.8 hardening.

            ### Crates published to crates.io

            | Crate | Version | Description |
            |-------|---------|-------------|
            | [`animato-core`](https://crates.io/crates/animato-core) | `${{ steps.version.outputs.VERSION }}` | Traits + **38** easing variants (5 new advanced) |
            | [`animato-color`](https://crates.io/crates/animato-color) | `${{ steps.version.outputs.VERSION }}` | Perceptual color wrappers |
            | [`animato-tween`](https://crates.io/crates/animato-tween) | `${{ steps.version.outputs.VERSION }}` | `Tween<T>`, `KeyframeTrack<T>` |
            | [`animato-spring`](https://crates.io/crates/animato-spring) | `${{ steps.version.outputs.VERSION }}` | `Spring`, `SpringN<T>` |
            | [`animato-path`](https://crates.io/crates/animato-path) | `${{ steps.version.outputs.VERSION }}` | **`MorphPath`**, **`DrawSvg`**, Bezier, SVG parser |
            | [`animato-physics`](https://crates.io/crates/animato-physics) | `${{ steps.version.outputs.VERSION }}` | Inertia, drag, gestures |
            | [`animato-driver`](https://crates.io/crates/animato-driver) | `${{ steps.version.outputs.VERSION }}` | `AnimationDriver`, clocks, **`ScrollDriver`**, **`ScrollClock`** |
            | [`animato-timeline`](https://crates.io/crates/animato-timeline) | `${{ steps.version.outputs.VERSION }}` | `Timeline`, `Sequence`, stagger |
            | [`animato-gpu`](https://crates.io/crates/animato-gpu) | `${{ steps.version.outputs.VERSION }}` | `GpuAnimationBatch` with CPU fallback |
            | [`animato-wasm`](https://crates.io/crates/animato-wasm) | `${{ steps.version.outputs.VERSION }}` | `RafDriver`, **`LayoutAnimator`**, **`SharedElementTransition`** |
            | [`animato-bevy`](https://crates.io/crates/animato-bevy) | `${{ steps.version.outputs.VERSION }}` | `AnimatoPlugin` |
            | [`animato`](https://crates.io/crates/animato) | `${{ steps.version.outputs.VERSION }}` | Facade — re-exports everything |

            ### Quick Start

            ```toml
            [dependencies]
            animato = { version = "${{ steps.version.outputs.VERSION }}", features = ["gpu"] }
            ```

            ```rust
            use animato::{Easing, GpuAnimationBatch, Tween};

            let mut batch = GpuAnimationBatch::new_auto();
            batch.push(
                Tween::new(0.0_f32, 100.0)
                    .duration(1.0)
                    .easing(Easing::EaseOutCubic)
                    .build(),
            );

            batch.tick(1.0 / 60.0);
            let values = batch.read_back();
            ```

            ### What's New in v0.9.0 — Performance
            - ✅ `animato-gpu` with `GpuAnimationBatch`
            - ✅ `gpu` facade feature
            - ✅ CPU fallback for unavailable GPU or unsupported easing
            - ✅ `TweenSnapshot` and batch-friendly tween state accessors
            - ✅ Allocation-free `MorphPath::evaluate_into()` and `bounds_at()`
            - ✅ `SharedElementTransition::reset()` fixed
            - ✅ Timeline and GPU batch benchmarks plus `docs/benchmarks.md`
            - ✅ Stronger no_std/alloc and no-default-features release gates

            See [CHANGELOG.md](./CHANGELOG.md) and [ROADMAP.md](./ROADMAP.md) for full details.
          draft: false
          prerelease: false
