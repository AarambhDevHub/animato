name: Publish

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Pre-publish gate ─────────────────────────────────────────────────────────
  verify:
    name: Pre-publish verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Run full test suite
        run: cargo test --workspace --all-features

      - name: Run no_std check (no_std-compatible crates only)
        run: cargo test -p animato-core -p animato-tween -p animato-spring -p animato-path --no-default-features

      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── Publish in dependency order ───────────────────────────────────────────────
  # Each crate must be visible on crates.io before the next can be published.
  # The 30s sleep gives the registry index time to propagate.
  #
  # v0.4.0 scope: animato-core → animato-tween → animato-spring → animato-path → animato-driver → animato-timeline → animato
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish animato-core
        run: cargo publish -p animato-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-tween
        run: cargo publish -p animato-tween --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-spring
        run: cargo publish -p animato-spring --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-path
        run: cargo publish -p animato-path --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-driver
        run: cargo publish -p animato-driver --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-timeline
        run: cargo publish -p animato-timeline --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato (facade)
        run: cargo publish -p animato --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write   # required to create releases

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "Animato ${{ steps.version.outputs.TAG }} — Paths"
          body: |
            ## Animato ${{ steps.version.outputs.TAG }} — Paths

            The fourth release of the Animato animation library for Rust, adding Bezier curves, motion paths, CatmullRom splines, and SVG path parsing.

            ### Crates published to crates.io

            | Crate | Version | Description |
            |-------|---------|-------------|
            | [`animato-core`](https://crates.io/crates/animato-core) | `${{ steps.version.outputs.VERSION }}` | Traits + 33 easing variants, `no_std` |
            | [`animato-tween`](https://crates.io/crates/animato-tween) | `${{ steps.version.outputs.VERSION }}` | `Tween<T>`, `Loop`, builder pattern, `no_std`, `KeyframeTrack`, serde |
            | [`animato-spring`](https://crates.io/crates/animato-spring) | `${{ steps.version.outputs.VERSION }}` | `Spring`, `SpringN<T>`, 5 presets, `no_std` |
            | [`animato-path`](https://crates.io/crates/animato-path) | `${{ steps.version.outputs.VERSION }}` | Bezier curves, CatmullRom splines, motion paths, SVG parser |
            | [`animato-driver`](https://crates.io/crates/animato-driver) | `${{ steps.version.outputs.VERSION }}` | `AnimationDriver`, `Clock` variants |
            | [`animato-timeline`](https://crates.io/crates/animato-timeline) | `${{ steps.version.outputs.VERSION }}` | `Timeline`, `Sequence`, `stagger`, time scale, callbacks, async wait |
            | [`animato`](https://crates.io/crates/animato) | `${{ steps.version.outputs.VERSION }}` | Facade — re-exports all of the above |

            ### Quick Start

            ```toml
            [dependencies]
            animato = { version = "${{ steps.version.outputs.VERSION }}", features = ["path"] }
            ```

            ```rust
            use animato::{CubicBezierCurve, MotionPathTween, Easing, Update};

            let curve = CubicBezierCurve::new(
                [0.0, 0.0],
                [40.0, 90.0],
                [140.0, -90.0],
                [200.0, 0.0],
            );

            let mut motion = MotionPathTween::new(curve)
                .duration(1.0)
                .easing(Easing::EaseInOutSine)
                .auto_rotate(true)
                .build();

            motion.update(0.016);
            let position = motion.value();
            ```

            ### What's New in v0.4.0
            - ✅ New `animato-path` crate
            - ✅ `QuadBezier`, `CubicBezierCurve`, and `CatmullRomSpline`
            - ✅ Arc-length-normalized path evaluation
            - ✅ `MotionPath` and `MotionPathTween` with auto-rotate and offsets
            - ✅ `CompoundPath`, `PathCommand`, lines, quadratic/cubic curves, and SVG arcs
            - ✅ `SvgPathParser` for `M`, `L`, `H`, `V`, `C`, `Q`, `A`, `Z` plus lowercase relative variants
            - ✅ `path` facade feature, motion path example, tests, and benchmarks

            ### What's Included
            - ✅ `no_std` support for `animato-core`, `animato-tween`, `animato-spring`, and fixed path curves in `animato-path`
            - ✅ Criterion benchmarks for easing, tween, spring, timeline, and paths
            - ✅ CI: stable + beta + nightly toolchains

            See [CHANGELOG.md](./CHANGELOG.md) and [ROADMAP.md](./ROADMAP.md) for details.
          draft: false
          prerelease: false
