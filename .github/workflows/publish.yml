name: Publish

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Pre-publish gate ─────────────────────────────────────────────────────────
  verify:
    name: Pre-publish verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Run full test suite
        run: cargo test --workspace --all-features

      - name: Run no_std check (no_std-compatible crates only)
        run: cargo test -p animato-core -p animato-tween -p animato-spring -p animato-path -p animato-physics -p animato-color --no-default-features

      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── Publish in dependency order ───────────────────────────────────────────────
  # Each crate must be visible on crates.io before the next can be published.
  # The 30s sleep gives the registry index time to propagate.
  #
  # v0.6.0 scope: animato-core → animato-color → animato-tween → animato-spring → animato-path → animato-physics → animato-driver → animato-timeline → animato
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish animato-core
        run: cargo publish -p animato-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-color
        run: cargo publish -p animato-color --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-tween
        run: cargo publish -p animato-tween --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-spring
        run: cargo publish -p animato-spring --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-path
        run: cargo publish -p animato-path --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-physics
        run: cargo publish -p animato-physics --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-driver
        run: cargo publish -p animato-driver --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato-timeline
        run: cargo publish -p animato-timeline --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for registry index
        run: sleep 30

      - name: Publish animato (facade)
        run: cargo publish -p animato --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write   # required to create releases

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "Animato ${{ steps.version.outputs.TAG }} — Color"
          body: |
            ## Animato ${{ steps.version.outputs.TAG }} — Color

            The sixth release of the Animato animation library for Rust, adding perceptual color interpolation through Lab, Oklch, and linear-light sRGB.

            ### Crates published to crates.io

            | Crate | Version | Description |
            |-------|---------|-------------|
            | [`animato-core`](https://crates.io/crates/animato-core) | `${{ steps.version.outputs.VERSION }}` | Traits + 33 easing variants, `no_std` |
            | [`animato-color`](https://crates.io/crates/animato-color) | `${{ steps.version.outputs.VERSION }}` | `InLab<C>`, `InOklch<C>`, and `InLinear<C>` perceptual color wrappers |
            | [`animato-tween`](https://crates.io/crates/animato-tween) | `${{ steps.version.outputs.VERSION }}` | `Tween<T>`, `Loop`, builder pattern, `no_std`, `KeyframeTrack`, serde |
            | [`animato-spring`](https://crates.io/crates/animato-spring) | `${{ steps.version.outputs.VERSION }}` | `Spring`, `SpringN<T>`, 5 presets, `no_std` |
            | [`animato-path`](https://crates.io/crates/animato-path) | `${{ steps.version.outputs.VERSION }}` | Bezier curves, CatmullRom splines, motion paths, SVG parser |
            | [`animato-physics`](https://crates.io/crates/animato-physics) | `${{ steps.version.outputs.VERSION }}` | `Inertia`, `DragState`, `GestureRecognizer`, pinch, rotation |
            | [`animato-driver`](https://crates.io/crates/animato-driver) | `${{ steps.version.outputs.VERSION }}` | `AnimationDriver`, `Clock` variants |
            | [`animato-timeline`](https://crates.io/crates/animato-timeline) | `${{ steps.version.outputs.VERSION }}` | `Timeline`, `Sequence`, `stagger`, time scale, callbacks, async wait |
            | [`animato`](https://crates.io/crates/animato) | `${{ steps.version.outputs.VERSION }}` | Facade — re-exports all of the above |

            ### Quick Start

            ```toml
            [dependencies]
            animato = { version = "${{ steps.version.outputs.VERSION }}", features = ["color"] }
            ```

            ```rust
            use animato::{InLab, Tween, Update, palette::Srgb};

            let mut tween = Tween::new(
                InLab::new(Srgb::new(1.0, 0.0, 0.0)),
                InLab::new(Srgb::new(0.0, 0.0, 1.0)),
            )
            .duration(1.0)
            .build();

            tween.update(0.5);
            let midpoint = tween.value().into_inner();
            ```

            ### What's New in v0.6.0
            - ✅ New `animato-color` crate
            - ✅ `InLab<C>` for CIE L*a*b* interpolation
            - ✅ `InOklch<C>` for modern perceptual Oklch interpolation
            - ✅ `InLinear<C>` for gamma-correct linear-light sRGB interpolation
            - ✅ `color` facade feature, color example, and integration tests

            ### What's Included
            - ✅ `no_std` support for `animato-core`, `animato-tween`, `animato-spring`, fixed path curves in `animato-path`, 1D inertia/gestures in `animato-physics`, and `animato-color`
            - ✅ Criterion benchmarks for easing, tween, spring, timeline, paths, and physics
            - ✅ CI: stable + beta + nightly toolchains

            See [CHANGELOG.md](./CHANGELOG.md) and [ROADMAP.md](./ROADMAP.md) for details.
          draft: false
          prerelease: false
