name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, nightly]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-
            ${{ runner.os }}-cargo-

      - name: Test (default features)
        run: cargo test --workspace

      - name: Test (all features)
        run: cargo test --workspace --all-features

      # Only test no_std-compatible crates without default features.
      # animato-driver requires std (WallClock uses std::time::Instant).
      # animato-bevy, animato-timeline, and animato-wasm also require std/hosted.
      # animato-path draw.rs tests are gated on std/alloc (poly module dependency).
      - name: Test no_std crates (no default features)
        run: |
          cargo test \
            -p animato-core \
            -p animato-tween \
            -p animato-spring \
            -p animato-path \
            -p animato-physics \
            -p animato-color \
            --no-default-features

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-features -- -D warnings

  # ── Docs ───────────────────────────────────────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-docs-
            ${{ runner.os }}-cargo-

      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── Benchmarks compile ─────────────────────────────────────────────────────
  benches:
    name: Benches compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-
            ${{ runner.os }}-cargo-

      - name: Check benches compile
        run: cargo bench --workspace --no-run

  # ── no_std cross-compile ───────────────────────────────────────────────────
  no-std:
    name: no_std cross-compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7m-none-eabi

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-nostd-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nostd-
            ${{ runner.os }}-cargo-

      # Build all no_std-compatible crates for bare-metal.
      # animato-driver, animato-bevy, animato-timeline, and animato-wasm are
      # excluded — they require std or a hosted runtime.
      - name: Build animato-core (no_std)
        run: cargo build -p animato-core --target thumbv7m-none-eabi --no-default-features

      - name: Build animato-tween (no_std)
        run: cargo build -p animato-tween --target thumbv7m-none-eabi --no-default-features

      - name: Build animato-spring (no_std)
        run: cargo build -p animato-spring --target thumbv7m-none-eabi --no-default-features

      - name: Build animato-path (no_std)
        run: cargo build -p animato-path --target thumbv7m-none-eabi --no-default-features

      - name: Build animato-physics (no_std)
        run: cargo build -p animato-physics --target thumbv7m-none-eabi --no-default-features

      - name: Build animato-color (no_std)
        run: cargo build -p animato-color --target thumbv7m-none-eabi --no-default-features

  # ── WASM compile ───────────────────────────────────────────────────────────
  wasm:
    name: WASM integration compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-
            ${{ runner.os }}-cargo-

      - name: Check animato-wasm with DOM helpers
        run: cargo check -p animato-wasm --target wasm32-unknown-unknown --features wasm-dom

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Run wasm-pack browser tests
        run: |
          cd examples/wasm_counter
          wasm-pack test --headless --chrome

  # ── Coverage ───────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-
            ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run coverage gate
        run: cargo llvm-cov --workspace --all-features --fail-under-lines 90

  # ── Fuzz smoke ─────────────────────────────────────────────────────────────
  fuzz:
    name: Fuzz SVG parser
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock', 'fuzz/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fuzz-
            ${{ runner.os }}-cargo-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run SVG parser fuzz smoke test
        run: cargo fuzz run svg_path_parser -- -max_total_time=60

  # ── Security audit ─────────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit
